<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a070d0"/>
      <stop offset="100%" style="stop-color:#6a3fa8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Sudoku grid (white card) -->
  <rect x="18" y="22" width="64" height="58" rx="6" fill="white" opacity="0.95"/>
  <!-- Grid lines vertical -->
  <line x1="39" y1="22" x2="39" y2="80" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="22" x2="60" y2="80" stroke="#ccc" stroke-width="1"/>
  <!-- Grid lines horizontal -->
  <line x1="18" y1="41" x2="82" y2="41" stroke="#ccc" stroke-width="1"/>
  <line x1="18" y1="60" x2="82" y2="60" stroke="#ccc" stroke-width="1"/>
  <!-- Thick box borders -->
  <rect x="18" y="22" width="64" height="58" rx="6" fill="none" stroke="#8c60c0" stroke-width="2.5"/>
  <line x1="39" y1="22" x2="39" y2="80" stroke="#8c60c0" stroke-width="2"/>
  <line x1="60" y1="22" x2="60" y2="80" stroke="#8c60c0" stroke-width="2"/>
  <line x1="18" y1="41" x2="82" y2="41" stroke="#8c60c0" stroke-width="2"/>
  <line x1="18" y1="60" x2="82" y2="60" stroke="#8c60c0" stroke-width="2"/>
  <!-- Highlighted cell -->
  <rect x="39" y="41" width="21" height="19" rx="2" fill="#e8dcff"/>
  <!-- Sample numbers -->
  <text x="28" y="37" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">5</text>
  <text x="50" y="37" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">8</text>
  <text x="71" y="37" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">1</text>
  <text x="28" y="56" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">3</text>
  <text x="50" y="56" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8c60c0" text-anchor="middle">6</text>
  <text x="71" y="56" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">4</text>
  <text x="28" y="75" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">7</text>
  <text x="50" y="75" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">2</text>
  <text x="71" y="75" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a2030" text-anchor="middle">9</text>
  <!-- Pink heart accent -->
  <text x="78" y="20" font-family="sans-serif" font-size="13" fill="#e87baa">♥</text>
</svg>
